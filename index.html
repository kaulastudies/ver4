<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaula Institutional Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf8; }
        .serif { font-family: 'Playfair Display', serif; }
        .hidden { display: none; }
        .demo-pill { @apply px-4 py-2 rounded-full border border-stone-200 text-[10px] font-black uppercase tracking-widest hover:bg-stone-50 transition-all text-stone-600 cursor-pointer; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="authPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-stone-100">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-[450px] border border-stone-200">
            <div class="text-center mb-10">
                <h1 class="serif text-4xl text-stone-900 mb-2">Kaula Archive</h1>
                <p class="text-[10px] text-stone-400 uppercase tracking-[0.3em] font-bold">Secure Access Portal</p>
            </div>
            
            <div id="loginForm" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-stone-400 uppercase ml-2">Username</label>
                    <input type="text" id="username" placeholder="e.g. ramachandra" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-stone-400 uppercase ml-2">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all">
                </div>
                <button onclick="handleAuth('login')" class="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-lg">Sign In</button>
            </div>

            <div class="mt-10 pt-8 border-t border-stone-100">
                <p class="text-[9px] text-orange-600 font-black uppercase tracking-widest mb-4 text-center">Quick Demo Roles</p>
                <div class="flex flex-wrap justify-center gap-2">
                    <div onclick="quickLogin('admin')" class="demo-pill border-orange-200 text-orange-700">Admin</div>
                    <div onclick="quickLogin('scholar')" class="demo-pill border-blue-200 text-blue-700">Scholar</div>
                    <div onclick="quickLogin('proof')" class="demo-pill">Proofreader</div>
                    <div onclick="quickLogin('typist')" class="demo-pill">Typist</div>
                    <div onclick="quickLogin('guest')" class="demo-pill bg-stone-900 text-white border-none">Public Guest</div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-full">
        <aside class="w-72 bg-stone-950 text-stone-400 flex flex-col border-r border-stone-900">
            <div class="p-8">
                <h2 class="text-white font-bold tracking-tighter text-2xl italic">Archive <span class="text-orange-500">OS</span></h2>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
                <div id="historySection" class="my-8">
                    <p class="px-4 text-[9px] uppercase tracking-[0.2em] font-black text-stone-600 mb-4">Continuing Study</p>
                    <div id="recentReadings" class="space-y-1 px-2 text-stone-200">
                        </div>
                </div>

                <p class="px-4 text-[9px] uppercase tracking-[0.2em] font-black text-stone-600 mb-4">Navigation</p>
                <button onclick="showView('catalog')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-sm font-medium">📖 Library Catalog</button>
                
                <div id="adminMenu" class="hidden space-y-2 mt-8">
                    <p class="px-4 text-[9px] uppercase tracking-[0.2em] font-black text-stone-600 my-4">Governance</p>
                    <button onclick="showView('admin')" class="w-full text-left px-4 py-3 rounded-xl bg-orange-600/10 text-orange-500 text-sm font-bold">🛡️ User Management</button>
                </div>
            </nav>

            <div class="p-6 bg-black flex items-center justify-between border-t border-stone-900">
                <div>
                    <p class="text-xs text-white font-bold" id="u-name">--</p>
                    <p class="text-[9px] uppercase text-stone-500 font-black tracking-widest" id="u-role">--</p>
                </div>
                <button onclick="logout()" class="text-[10px] font-black text-stone-600 hover:text-white uppercase transition-colors">Exit</button>
            </div>
        </aside>

        <main class="flex-1 bg-[#fcfaf8] overflow-hidden flex flex-col">
            <section id="view-catalog" class="flex-1 p-10 overflow-y-auto">
                <div class="max-w-5xl mx-auto">
                    <header class="mb-12">
                        <h2 class="serif text-5xl text-stone-900 mb-4">Digital Repository</h2>
                        <div class="w-24 h-1 bg-orange-500"></div>
                    </header>
                    <input type="text" id="search" oninput="loadCatalog()" placeholder="Search by Volume, Chapter, or Manuscript title..." class="w-full p-5 rounded-3xl border-none shadow-sm focus:ring-2 focus:ring-orange-500 text-sm mb-10 transition-all">
                    <div id="catalogList" class="grid grid-cols-1 gap-4"></div>
                </div>
            </section>

            <section id="view-admin" class="hidden flex-1 p-12 overflow-y-auto">
                <div class="max-w-5xl mx-auto">
                    <h2 class="serif text-4xl mb-4">Institutional Roles</h2>
                    <p class="text-stone-400 text-sm mb-12">Assign permissions to Scholars, Typists, and Supervisors.</p>
                    <div class="bg-white rounded-[32px] border border-stone-200 overflow-hidden shadow-sm">
                        <table class="w-full text-left">
                            <thead class="bg-stone-50 text-[10px] uppercase font-black tracking-widest text-stone-400 border-b border-stone-100">
                                <tr><th class="p-8">Identity</th><th class="p-8">Assigned Role</th><th class="p-8 text-right">Action</th></tr>
                            </thead>
                            <tbody id="userTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://gcgxcnbimqpfrowesfms.supabase.co";
        const SUPABASE_KEY = "sb_publishable_XObSGljjo-VILprIHw_Bxw_FKM7uUOU";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DOMAIN = "@kaula.org"; // Background domain

        // --- AUTH ---
        async function quickLogin(u) {
            document.getElementById('username').value = u;
            document.getElementById('password').value = "demo123";
            handleAuth('login');
        }

        async function handleAuth(type) {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Faking username by appending domain
            const email = user.includes('@') ? user : user + DOMAIN;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Invalid Username or Password");
            else window.location.reload();
        }

        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('authPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadProfile(session.user);
            }
        }

        async function loadProfile(user) {
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            const role = profile?.role || 'public';
            
            // Update UI Sidebar
            document.getElementById('u-name').innerText = profile?.full_name || user.email.split('@')[0];
            document.getElementById('u-role').innerText = role;

            if (role === 'admin') {
                document.getElementById('adminMenu').classList.remove('hidden');
                loadUserManagement();
            }
            loadCatalog();
            loadHistory(user.id);
        }

        // --- CATALOG & HISTORY ---
        async function loadCatalog() {
            const { data } = await supabase.from('manuscripts').select('*').limit(20);
            document.getElementById('catalogList').innerHTML = data.map(m => `
                <div onclick="logRead('${m.id}')" class="bg-white p-6 rounded-[24px] border border-stone-100 flex justify-between items-center hover:border-orange-200 transition-all cursor-pointer shadow-sm group">
                    <div>
                        <h4 class="font-bold text-stone-900 group-hover:text-orange-900">${m.title_iast}</h4>
                        <p class="text-[10px] text-stone-400 font-bold uppercase mt-1 tracking-widest">${m.subject}</p>
                    </div>
                    <span class="text-[10px] font-black text-stone-200 uppercase">${m.catalog_no || 'TBD'}</span>
                </div>
            `).join('');
        }

        async function logRead(id) {
            const { data: { user } } = await supabase.auth.getUser();
            if (user.email.startsWith('guest')) return;
            await supabase.from('reading_history').upsert({ user_id: user.id, manuscript_id: id, last_read_at: new Date() });
            loadHistory(user.id);
        }

        async function loadHistory(uid) {
            const { data } = await supabase.from('reading_history').select('manuscripts(title_iast)').eq('user_id', uid).order('last_read_at', {ascending:false}).limit(3);
            if(data && data.length > 0) {
                document.getElementById('recentReadings').innerHTML = data.map(h => `
                    <div class="px-4 py-2 hover:bg-white/5 rounded-xl cursor-default text-xs">📜 ${h.manuscripts.title_iast}</div>
                `).join('');
            } else {
                document.getElementById('recentReadings').innerHTML = `<p class="px-4 text-[10px] text-stone-700 italic">No recent activity</p>`;
            }
        }

        // --- ADMIN MGMT ---
        async function loadUserManagement() {
            const { data } = await supabase.from('profiles').select('*');
            document.getElementById('userTableBody').innerHTML = data.map(p => `
                <tr class="border-t border-stone-50 hover:bg-stone-50/50 transition-all">
                    <td class="px-8 py-6 font-bold text-stone-800">${p.full_name || p.id.split('-')[0]}</td>
                    <td class="px-8 py-6 text-[10px] font-black uppercase text-stone-400 tracking-widest">${p.role}</td>
                    <td class="px-8 py-6 text-right">
                        <select onchange="updateRole('${p.id}', this.value)" class="bg-stone-100 rounded-xl text-[10px] font-bold p-2 outline-none">
                            <option ${p.role==='public'?'selected':''}>public</option>
                            <option ${p.role==='scholar'?'selected':''}>scholar</option>
                            <option ${p.role==='typist'?'selected':''}>typist</option>
                            <option ${p.role==='proofreader'?'selected':''}>proofreader</option>
                            <option ${p.role==='admin'?'selected':''}>admin</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        async function updateRole(uid, role) {
            await supabase.from('profiles').update({ role }).eq('id', uid);
            alert("Role updated to " + role);
        }

        function showView(v) {
            document.getElementById('view-catalog').classList.add('hidden');
            document.getElementById('view-admin').classList.add('hidden');
            document.getElementById('view-' + v).classList.remove('hidden');
        }

        async function logout() { await supabase.auth.signOut(); window.location.reload(); }
        window.onload = checkSession;
    </script>
</body>
</html>
