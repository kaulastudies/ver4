<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaula Archive - Full Institutional Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf8; color: #1c1917; }
        .serif { font-family: 'Playfair Display', serif; }
        .hidden { display: none; }
        .demo-pill { cursor: pointer; border: 1px solid #e7e5e4; padding: 6px 12px; border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; }
        .demo-pill:hover { background-color: #f5f5f4; }
        
        /* Layout Transitions */
        #previewPane { transition: width 0.3s ease-in-out; }
        .active-row { border-left: 4px solid #c2410c !important; background-color: #fffaf0 !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="authPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-stone-100">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-[450px] border border-stone-200">
            <div class="text-center mb-10">
                <h1 class="serif text-4xl text-stone-900 mb-2">Kaula Archive</h1>
                <p class="text-[10px] text-stone-400 uppercase tracking-[0.3em] font-bold text-center">Varanasi Digital Lab</p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="Username" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 text-sm">
                <input type="password" id="passInput" placeholder="Password" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 text-sm">
                <button onclick="handleLoginAttempt()" class="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all">Enter Portal</button>
            </div>

            <div class="mt-10 pt-8 border-t border-stone-100 text-center">
                <p class="text-[9px] text-orange-600 font-black uppercase tracking-widest mb-4 italic">Demonstration Access</p>
                <div class="flex flex-wrap justify-center gap-2">
                    <div onclick="prefillAndEnter('admin')" class="demo-pill text-orange-700 border-orange-200">Admin</div>
                    <div onclick="prefillAndEnter('scholar')" class="demo-pill text-blue-700 border-blue-200">Scholar</div>
                    <div onclick="prefillAndEnter('proof')" class="demo-pill">Proofreader</div>
                    <div onclick="prefillAndEnter('typist')" class="demo-pill">Typist</div>
                    <div onclick="prefillAndEnter('guest')" class="demo-pill bg-stone-900 text-white border-none">Guest</div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-full">
        
        <aside class="w-72 bg-stone-950 text-stone-400 flex flex-col border-r border-stone-900">
            <div class="p-8 border-b border-stone-900">
                <h2 class="text-white font-bold text-2xl italic">Archive <span class="text-orange-500">OS</span></h2>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
                <div class="my-8">
                    <p class="px-4 text-[9px] uppercase tracking-[0.2em] font-black text-stone-600 mb-4">Reading History</p>
                    <div id="historyList" class="space-y-1 px-2 text-stone-200">
                        </div>
                </div>

                <p class="px-4 text-[9px] uppercase tracking-[0.2em] font-black text-stone-600 mb-4">Library</p>
                <button onclick="changeSection('catalog')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-sm font-medium">📖 Library Catalog</button>
                
                <div id="adminControls" class="hidden space-y-2 mt-8">
                    <p class="px-4 text-[9px] uppercase tracking-[0.2em] font-black text-stone-600 my-4">Governance</p>
                    <button onclick="changeSection('admin')" class="w-full text-left px-4 py-3 rounded-xl bg-orange-600/10 text-orange-400 text-sm font-bold border border-orange-900/30">🛡️ User Management</button>
                </div>
            </nav>

            <div class="p-6 bg-black flex items-center justify-between border-t border-stone-900">
                <div>
                    <p class="text-xs text-white font-bold" id="userName">--</p>
                    <p class="text-[9px] uppercase text-stone-500 font-black tracking-widest" id="userRole">--</p>
                </div>
                <button onclick="logoutAction()" class="text-[10px] font-black text-stone-700 hover:text-white uppercase transition-colors">Exit</button>
            </div>
        </aside>

        <main class="flex-1 bg-[#fcfaf8] overflow-hidden flex flex-col min-w-0">
            
            <section id="section-catalog" class="flex-1 flex flex-col p-10 overflow-hidden">
                <div class="max-w-5xl mx-auto w-full flex flex-col h-full">
                    <header class="mb-8">
                        <h2 class="serif text-5xl text-stone-900 mb-2">Research Repository</h2>
                        <div class="w-20 h-1 bg-orange-500 rounded-full mb-6"></div>
                        <div class="relative">
                            <span class="absolute left-4 top-4 text-stone-300">🔍</span>
                            <input type="text" id="catalogSearch" oninput="fetchManuscripts()" placeholder="Search by Volume, Chapter, Sage, or Keyword..." class="w-full p-4 pl-12 rounded-[20px] border-none shadow-sm focus:ring-2 focus:ring-orange-500 text-sm transition-all outline-none">
                        </div>
                    </header>
                    <div id="catalogContainer" class="flex-1 overflow-y-auto pr-4 space-y-3">
                        </div>
                </div>
            </section>

            <section id="section-admin" class="hidden flex-1 p-12 overflow-y-auto">
                <div class="max-w-5xl mx-auto">
                    <h2 class="serif text-4xl mb-4">Institutional Roles</h2>
                    <p class="text-stone-400 text-sm mb-12 italic">Promote public users to Scholars or Typists using the role selector.</p>
                    <div class="bg-white rounded-[32px] border border-stone-200 overflow-hidden shadow-sm">
                        <table class="w-full text-left">
                            <thead class="bg-stone-50 text-[10px] uppercase font-black tracking-widest text-stone-400 border-b border-stone-100">
                                <tr><th class="p-8">Identity</th><th class="p-8">Assigned Role</th><th class="p-8 text-right">Action</th></tr>
                            </thead>
                            <tbody id="adminUserTable"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <aside id="previewPane" class="w-0 bg-white border-l border-stone-200 flex flex-col overflow-hidden">
            <div id="previewContent" class="p-10 invisible opacity-0 transition-opacity duration-300">
                </div>
        </aside>
    </div>

    <script>
        // 1. Connection (Unique Variable)
        const URL_ENDPOINT = "https://gcgxcnbimqpfrowesfms.supabase.co";
        const KEY_ACCESS = "sb_publishable_XObSGljjo-VILprIHw_Bxw_FKM7uUOU";
        const kArchive = supabase.createClient(URL_ENDPOINT, KEY_ACCESS);

        // 2. Demo Logic
        async function prefillAndEnter(user) {
            document.getElementById('userInput').value = user;
            document.getElementById('passInput').value = "demo123";
            handleLoginAttempt();
        }

        async function handleLoginAttempt() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const email = user.includes('@') ? user : user + "@kaula.org";

            const { data, error } = await kArchive.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Access Denied: Check username/password.");
            else location.reload();
        }

        // 3. Application State
        async function initPortal() {
            const { data: { session } } = await kArchive.auth.getSession();
            if (session) {
                document.getElementById('authPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadRoleAccess(session.user);
            }
        }

        async function loadRoleAccess(user) {
            const { data: profile } = await kArchive.from('profiles').select('*').eq('id', user.id).single();
            const role = profile?.role || 'public';

            document.getElementById('userName').innerText = profile?.full_name || user.email.split('@')[0];
            document.getElementById('userRole').innerText = role;

            if (role === 'admin') {
                document.getElementById('adminControls').classList.remove('hidden');
                loadGovernancePanel();
            }
            fetchManuscripts();
            loadHistory(user.id);
        }

        // 4. Library Search & Catalog
        async function fetchManuscripts() {
            const searchTerm = document.getElementById('catalogSearch').value;
            let query = kArchive.from('manuscripts').select('*').limit(30);
            
            // Searchable feature built earlier
            if (searchTerm) {
                query = query.ilike('search_blob', `%${searchTerm}%`);
            }

            const { data } = await query;
            const container = document.getElementById('catalogContainer');
            if (data) {
                container.innerHTML = data.map(m => `
                    <div onclick="openManuscript(${JSON.stringify(m).replace(/"/g, '&quot;')}, this)" 
                        class="bg-white p-6 rounded-[24px] border border-stone-100 flex justify-between items-center hover:border-orange-300 transition-all cursor-pointer shadow-sm group">
                        <div class="flex items-center space-x-4">
                            <span class="text-[10px] font-black text-stone-300 bg-stone-50 px-2 py-1 rounded w-16 text-center">${m.catalog_no || 'TBD'}</span>
                            <div>
                                <h4 class="font-bold text-stone-800 group-hover:text-orange-900">${m.title_iast}</h4>
                                <p class="text-[9px] text-stone-400 font-bold uppercase tracking-widest">${m.subject}</p>
                            </div>
                        </div>
                        <span class="text-stone-300">→</span>
                    </div>
                `).join('');
            }
        }

        // 5. Reading Pane & History
        async function openManuscript(m, element) {
            // UI Visual Feedback
            document.querySelectorAll('#catalogContainer > div').forEach(d => d.classList.remove('active-row'));
            element.classList.add('active-row');

            // Open Pane (Muktabodha style)
            const pane = document.getElementById('previewPane');
            const content = document.getElementById('previewContent');
            pane.style.width = "500px";
            content.classList.remove('invisible', 'opacity-0');

            content.innerHTML = `
                <div class="flex justify-between items-center mb-10">
                    <button onclick="closePane()" class="text-stone-400 hover:text-black text-[10px] font-black uppercase tracking-widest">✕ Back to Catalog</button>
                    <span class="text-[10px] text-stone-300">ID: ${m.id}</span>
                </div>
                <span class="text-[10px] uppercase font-black text-orange-600 tracking-[0.2em] mb-4 block">${m.subject}</span>
                <h2 class="serif text-4xl text-stone-900 mb-2 leading-tight">${m.title_iast}</h2>
                <p class="text-2xl text-stone-500 mb-8 italic">${m.title_dev || ''}</p>
                
                <div class="grid grid-cols-2 gap-8 py-8 border-t border-stone-100">
                    <div>
                        <label class="block text-[10px] font-black text-stone-400 uppercase mb-1">Sage/Author</label>
                        <p class="text-stone-800 font-medium">${m.author || 'Traditional'}</p>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-stone-400 uppercase mb-1">Catalog Number</label>
                        <p class="text-stone-800 font-medium">${m.catalog_no || 'VNS-ARCHIVE'}</p>
                    </div>
                </div>

                <div class="mt-8 p-8 bg-orange-50/50 rounded-[32px] border border-orange-100">
                    <h4 class="text-xs font-black text-orange-800 uppercase mb-4 tracking-widest">Sanskrit Text (Preview)</h4>
                    <p class="text-stone-500 text-sm leading-relaxed italic">The full digitized text is being processed. Once conversion is complete, the Sanskrit verses will appear here.</p>
                </div>
                
                <button class="w-full mt-10 bg-stone-900 text-white py-4 rounded-2xl font-bold text-sm hover:bg-black transition-all">Download Metadata (PDF)</button>
            `;

            // Log reading history
            const { data: { user } } = await kArchive.auth.getUser();
            if (user && !user.email.startsWith('guest')) {
                await kArchive.from('reading_history').upsert({ user_id: user.id, manuscript_id: m.id });
                loadHistory(user.id);
            }
        }

        async function loadHistory(uid) {
            const { data } = await kArchive.from('reading_history').select('manuscripts(title_iast)').eq('user_id', uid).order('last_read_at', {ascending: false}).limit(3);
            if (data) {
                document.getElementById('historyList').innerHTML = data.map(h => `<div class="px-4 py-2 hover:bg-white/5 rounded-xl text-xs truncate">📖 ${h.manuscripts.title_iast}</div>`).join('');
            }
        }

        function closePane() {
            document.getElementById('previewPane').style.width = "0px";
            document.getElementById('previewContent').classList.add('invisible', 'opacity-0');
        }

        // 6. Admin User Governance
        async function loadGovernancePanel() {
            const { data } = await kArchive.from('profiles').select('*');
            document.getElementById('adminUserTable').innerHTML = data.map(p => `
                <tr class="border-t border-stone-50 hover:bg-stone-50/50">
                    <td class="px-8 py-6 font-bold text-stone-800">${p.full_name || 'System User'}</td>
                    <td class="px-8 py-6 text-[10px] font-black uppercase text-stone-400 tracking-widest">${p.role}</td>
                    <td class="px-8 py-6 text-right">
                        <select onchange="updateProfileRole('${p.id}', this.value)" class="bg-stone-100 rounded-xl text-[10px] font-bold p-2 outline-none">
                            <option ${p.role==='public'?'selected':''}>public</option>
                            <option ${p.role==='scholar'?'selected':''}>scholar</option>
                            <option ${p.role==='typist'?'selected':''}>typist</option>
                            <option ${p.role==='proofreader'?'selected':''}>proofreader</option>
                            <option ${p.role==='admin'?'selected':''}>admin</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        async function updateProfileRole(uid, role) {
            await kArchive.from('profiles').update({ role }).eq('id', uid);
            alert("Updated user role to " + role);
        }

        function changeSection(viewName) {
            document.getElementById('section-catalog').classList.add('hidden');
            document.getElementById('section-admin').classList.add('hidden');
            document.getElementById('section-' + viewName).classList.remove('hidden');
        }

        async function logoutAction() {
            await kArchive.auth.signOut();
            location.reload();
        }

        window.onload = initPortal;
    </script>
</body>
</html>
