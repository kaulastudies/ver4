<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaula Research Archive - Institutional Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf8; color: #1c1917; }
        .serif { font-family: 'Playfair Display', serif; }
        .mono { font-family: 'Fira Code', monospace; }
        .hidden { display: none; }
        
        /* Smooth Scrolling & Custom UI */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
        .demo-pill { @apply px-4 py-2 rounded-full border border-stone-200 text-[10px] font-black uppercase tracking-widest hover:bg-stone-50 transition-all text-stone-600 cursor-pointer flex items-center justify-center; }
        .active-row { border-left: 4px solid #c2410c !important; background-color: #fffaf0 !important; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="authPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-stone-100">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-[450px] border border-stone-200">
            <div class="text-center mb-10">
                <h1 class="serif text-4xl text-stone-900 mb-2">Kaula Archive</h1>
                <p class="text-[10px] text-stone-400 uppercase tracking-[0.3em] font-bold">Varanasi Digital Heritage</p>
            </div>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-stone-400 uppercase ml-2">Username</label>
                    <input type="text" id="username" placeholder="e.g. admin" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all text-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-stone-400 uppercase ml-2">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all text-sm">
                </div>
                <button onclick="handleAuth()" class="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-lg">Sign In</button>
            </div>

            <div class="mt-10 pt-8 border-t border-stone-100 text-center">
                <p class="text-[9px] text-orange-600 font-black uppercase tracking-widest mb-4 italic underline underline-offset-4 decoration-2">Demonstration Access</p>
                <div class="flex flex-wrap justify-center gap-2">
                    <div onclick="quickDemo('admin')" class="demo-pill border-orange-200 text-orange-700">Admin</div>
                    <div onclick="quickDemo('scholar')" class="demo-pill border-blue-200 text-blue-700">Scholar</div>
                    <div onclick="quickDemo('proof')" class="demo-pill">Proofreader</div>
                    <div onclick="quickDemo('typist')" class="demo-pill">Typist</div>
                    <div onclick="quickDemo('guest')" class="demo-pill bg-stone-900 text-white border-none">Guest</div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-full">
        
        <aside class="w-72 bg-stone-950 text-stone-400 flex flex-col border-r border-stone-900">
            <div class="p-8">
                <h2 class="text-white font-bold tracking-tighter text-2xl italic">Archive <span class="text-orange-500">OS</span></h2>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
                <div id="historySection" class="my-8">
                    <p class="px-4 text-[9px] uppercase tracking-[0.2em] font-black text-stone-600 mb-4">Continuing Study</p>
                    <div id="recentReadings" class="space-y-1 px-2 text-stone-200">
                        </div>
                </div>

                <p class="px-4 text-[9px] uppercase tracking-[0.2em] font-black text-stone-600 mb-4">Library</p>
                <button onclick="switchView('catalog')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-sm font-medium">📖 Library Catalog</button>
                
                <div id="adminMenu" class="hidden space-y-2 mt-8">
                    <p class="px-4 text-[9px] uppercase tracking-[0.2em] font-black text-stone-600 my-4">Governance</p>
                    <button onclick="switchView('admin')" class="w-full text-left px-4 py-3 rounded-xl bg-orange-600/10 text-orange-500 text-sm font-bold">🛡️ User Management</button>
                </div>
            </nav>

            <div class="p-6 bg-black flex items-center justify-between border-t border-stone-900">
                <div>
                    <p class="text-xs text-white font-bold" id="ui-display-name">--</p>
                    <p class="text-[9px] uppercase text-stone-500 font-black tracking-widest" id="ui-display-role">--</p>
                </div>
                <button onclick="handleLogout()" class="text-[10px] font-black text-stone-700 hover:text-white uppercase">Exit</button>
            </div>
        </aside>

        <main class="flex-1 bg-[#fcfaf8] overflow-hidden flex flex-col">
            
            <section id="view-catalog" class="flex-1 p-10 overflow-y-auto">
                <div class="max-w-5xl mx-auto">
                    <header class="mb-10">
                        <h2 class="serif text-5xl text-stone-900 mb-4">Digital Repository</h2>
                        <div class="w-24 h-1 bg-orange-500 rounded-full"></div>
                    </header>
                    <input type="text" id="catalogSearch" oninput="loadCatalogData()" placeholder="Search volumes, chapters, or keywords..." class="w-full p-5 rounded-[24px] border-none shadow-sm focus:ring-2 focus:ring-orange-500 text-sm mb-10 transition-all outline-none">
                    <div id="catalogContainer" class="grid grid-cols-1 gap-4">
                        </div>
                </div>
            </section>

            <section id="view-admin" class="hidden flex-1 p-12 overflow-y-auto">
                <div class="max-w-5xl mx-auto">
                    <h2 class="serif text-4xl mb-12">Institutional Roles</h2>
                    <div class="bg-white rounded-[32px] border border-stone-200 overflow-hidden shadow-sm">
                        <table class="w-full text-left">
                            <thead class="bg-stone-50 text-[10px] uppercase font-black tracking-widest text-stone-400 border-b border-stone-100">
                                <tr><th class="p-8">Identity</th><th class="p-8">Assigned Role</th><th class="p-8 text-right">Action</th></tr>
                            </thead>
                            <tbody id="adminUserTable">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // 1. CONFIGURATION
        const SB_URL = "https://gcgxcnbimqpfrowesfms.supabase.co";
        const SB_KEY = "sb_publishable_XObSGljjo-VILprIHw
