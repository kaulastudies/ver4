<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaula Institutional Archive - Editor v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf8; color: #1c1917; }
        .serif { font-family: 'Playfair Display', serif; }
        .hidden { display: none; }
        .active-row { border-left: 4px solid #c2410c !important; background-color: #fffaf0 !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="authPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-stone-100">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-[450px] border border-stone-200 text-center">
            <h1 class="serif text-4xl mb-2">Kaula Archive</h1>
            <p class="text-[10px] text-stone-400 uppercase tracking-widest mb-10">Institutional Entry</p>
            <div class="space-y-4">
                <input type="text" id="uIn" placeholder="Username" class="w-full p-4 bg-stone-50 border rounded-2xl outline-none text-sm">
                <input type="password" id="pIn" placeholder="Password" class="w-full p-4 bg-stone-50 border rounded-2xl outline-none text-sm">
                <button onclick="login()" class="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all">Enter Portal</button>
            </div>
            <div class="mt-8 flex flex-wrap justify-center gap-2">
                <div onclick="demo('admin')" class="cursor-pointer px-3 py-1 border rounded-full text-[9px] font-bold uppercase">Admin</div>
                <div onclick="demo('typist')" class="cursor-pointer px-3 py-1 border rounded-full text-[9px] font-bold uppercase">Typist</div>
                <div onclick="demo('proof')" class="cursor-pointer px-3 py-1 border rounded-full text-[9px] font-bold uppercase">Proofreader</div>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-full">
        <aside class="w-72 bg-stone-950 text-stone-400 flex flex-col border-r border-stone-900 overflow-y-auto">
            <div class="p-8 border-b border-stone-900">
                <h2 class="text-white font-bold text-xl italic">KAULA <span class="text-orange-500">OS</span></h2>
            </div>
            <nav class="p-6 space-y-4">
                <button onclick="setView('catalog')" class="w-full text-left text-xs font-bold hover:text-white transition-all">📖 Library Catalog</button>
                <button id="navAdmin" onclick="setView('admin')" class="hidden w-full text-left text-xs font-bold text-orange-500">🛡️ User Governance</button>
                
                <div class="mt-10">
                    <p class="text-[9px] font-black text-stone-600 uppercase mb-4 tracking-widest">Vertical Search</p>
                    <select id="fTantra" onchange="fetchData()" class="w-full bg-stone-900 border-none rounded-lg p-2 text-[10px] text-stone-300 outline-none mb-4">
                        <option value="">All Tantras</option>
                        <option>Tantraloka</option>
                        <option>Satsahasra</option>
                    </select>
                </div>
            </nav>
            <div class="mt-auto p-6 bg-black border-t border-stone-900">
                <p class="text-xs text-white font-bold" id="uName">--</p>
                <p class="text-[9px] uppercase text-stone-600" id="uRole">--</p>
                <button onclick="logout()" class="mt-2 text-[10px] text-stone-700 hover:text-white uppercase font-bold">Sign Out</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-[#f8f5f2] overflow-hidden">
            <section id="v-catalog" class="flex-1 flex flex-col p-10 overflow-hidden">
                <input type="text" id="mSearch" oninput="fetchData()" placeholder="Central Search..." class="w-full p-4 rounded-2xl shadow-sm border-none mb-8 text-sm">
                <div id="catalogList" class="flex-1 overflow-y-auto space-y-3 pr-4"></div>
            </section>
        </main>

        <aside id="previewPane" class="w-0 bg-white border-l border-stone-200 flex flex-col overflow-hidden transition-all duration-300">
            <div id="previewContent" class="p-10 invisible opacity-0 transition-opacity flex flex-col h-full">
                </div>
        </aside>
    </div>

    <script>
        const S_URL = "https://gcgxcnbimqpfrowesfms.supabase.co";
        const S_KEY = "sb_publishable_XObSGljjo-VILprIHw_Bxw_FKM7uUOU";
        const client = supabase.createClient(S_URL, S_KEY);
        let currentUserRole = 'public';

        async function demo(u) {
            document.getElementById('uIn').value = u;
            document.getElementById('pIn').value = "demo123";
            login();
        }

        async function login() {
            const u = document.getElementById('uIn').value;
            const p = document.getElementById('pIn').value;
            const e = u.includes('@') ? u : u + "@kaula.org";
            const { data, error } = await client.auth.signInWithPassword({ email: e, password: p });
            if (error) alert(error.message); else location.reload();
        }

        async function init() {
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                document.getElementById('authPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadProfile(session.user);
            }
        }

        async function loadProfile(user) {
            const { data: profile } = await client.from('profiles').select('*').eq('id', user.id).single();
            currentUserRole = profile?.role || 'public';
            document.getElementById('uName').innerText = profile?.full_name || user.email.split('@')[0];
            document.getElementById('uRole').innerText = currentUserRole;
            if (currentUserRole === 'admin') document.getElementById('navAdmin').classList.remove('hidden');
            fetchData();
        }

        async function fetchData() {
            const search = document.getElementById('mSearch').value;
            const tantra = document.getElementById('fTantra').value;
            let query = client.from('manuscripts').select('*');
            if (search) query = query.ilike('search_blob', `%${search}%`);
            if (tantra) query = query.eq('subject', tantra);
            const { data } = await query.limit(20);
            document.getElementById('catalogList').innerHTML = data.map(m => `
                <div onclick="preview(${JSON.stringify(m).replace(/"/g, '&quot;')}, this)" class="bg-white p-5 rounded-2xl border border-stone-100 flex justify-between items-center hover:border-orange-300 cursor-pointer shadow-sm">
                    <div>
                        <h4 class="font-bold text-stone-800">${m.title_iast}</h4>
                        <p class="text-[9px] text-stone-400 font-bold uppercase">${m.catalog_no || 'TBD'}</p>
                    </div>
                    <p class="text-[9px] text-stone-300 italic">Revision: ${m.last_revision_date ? new Date(m.last_revision_date).toLocaleDateString() : 'Original'}</p>
                </div>
            `).join('');
        }

        function preview(m, el) {
            document.querySelectorAll('#catalogList > div').forEach(d => d.classList.remove('active-row'));
            el.classList.add('active-row');
            const pane = document.getElementById('previewPane');
            const content = document.getElementById('previewContent');
            pane.style.width = "600px";
            content.classList.remove('invisible', 'opacity-0');

            const canEdit = ['admin', 'typist', 'proofreader'].includes(currentUserRole);
            const revisionDate = m.last_revision_date ? new Date(m.last_revision_date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : 'Pending Initial Entry';

            content.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <button onclick="closePane()" class="text-[9px] font-black uppercase tracking-widest text-stone-400">✕ Close</button>
                    <div class="text-right">
                        <p class="text-[9px] font-black text-orange-600 uppercase tracking-widest">Revision Date</p>
                        <p class="text-[10px] text-stone-500 font-bold">${revisionDate}</p>
                    </div>
                </div>
                
                <h2 class="serif text-3xl mb-1">${m.title_iast}</h2>
                <p class="text-xl text-stone-400 mb-8 italic border-b pb-4">${m.title_dev || ''}</p>
                
                <div class="flex-1 flex flex-col">
                    <label class="text-[10px] font-black text-stone-400 uppercase mb-2">Manuscript Content (Typed Portal Entry)</label>
                    <textarea id="editorContent" ${!canEdit ? 'readonly' : ''} 
                        class="flex-1 w-full p-6 bg-stone-50 border border-stone-100 rounded-3xl font-serif text-lg leading-relaxed outline-none focus:ring-2 focus:ring-orange-100 resize-none"
                        placeholder="Start typing the Sanskrit Unicode here...">${m.content || ''}</textarea>
                </div>

                ${canEdit ? `
                    <button onclick="saveEdit(${m.id})" class="mt-6 w-full bg-stone-900 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-black transition-all">
                        Update Manuscript & Timestamp
                    </button>
                ` : ''}
            `;
        }

        async function saveEdit(id) {
            const newContent = document.getElementById('editorContent').value;
            const now = new Date().toISOString();
            
            const { error } = await client.from('manuscripts').update({ 
                content: newContent,
                last_revision_date: now 
            }).eq('id', id);

            if (error) alert("Error saving: " + error.message);
            else {
                alert("Manuscript Updated. Revision Date Stamped: " + new Date().toLocaleDateString());
                fetchData();
            }
        }

        function closePane() { document.getElementById('previewPane').style.width = "0px"; }
        function logout() { client.auth.signOut(); location.reload(); }
        window.onload = init;
    </script>
</body>
</html>
