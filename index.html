<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaula Archive - Institutional Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf8; }
        .serif { font-family: 'Playfair Display', serif; }
        .hidden { display: none; }
        .demo-btn { cursor: pointer; border: 1px solid #e7e5e4; padding: 8px 16px; border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; }
        .demo-btn:hover { background-color: #f5f5f4; border-color: #d6d3d1; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="authPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-stone-100">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-[450px] border border-stone-200">
            <div class="text-center mb-10">
                <h1 class="serif text-4xl text-stone-900 mb-2">Kaula Archive</h1>
                <p class="text-[10px] text-stone-400 uppercase tracking-[0.3em] font-bold">Varanasi Digital Lab</p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="usernameField" placeholder="Username" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 text-sm">
                <input type="password" id="passwordField" placeholder="Password" class="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 text-sm">
                <button onclick="performLogin()" class="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all">Sign In</button>
            </div>

            <div class="mt-10 pt-8 border-t border-stone-100 text-center">
                <p class="text-[9px] text-orange-600 font-black uppercase tracking-widest mb-4 italic">Guruji's Demo Access</p>
                <div class="flex flex-wrap justify-center gap-2">
                    <div onclick="fillAndLogin('admin')" class="demo-btn text-orange-700 border-orange-200">Admin</div>
                    <div onclick="fillAndLogin('scholar')" class="demo-btn text-blue-700 border-blue-200">Scholar</div>
                    <div onclick="fillAndLogin('proof')" class="demo-btn">Proofreader</div>
                    <div onclick="fillAndLogin('typist')" class="demo-btn">Typist</div>
                    <div onclick="fillAndLogin('guest')" class="demo-btn bg-stone-900 text-white border-none">Guest</div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-full">
        <aside class="w-72 bg-stone-950 text-stone-400 flex flex-col">
            <div class="p-8 border-b border-stone-900">
                <h2 class="text-white font-bold text-2xl">KAULA <span class="text-orange-500">DB</span></h2>
            </div>
            <nav class="flex-1 p-6 space-y-4">
                <div>
                    <p class="text-[9px] font-black text-stone-600 uppercase mb-4 tracking-widest">Navigation</p>
                    <button onclick="showView('catalog')" class="text-sm hover:text-white transition-colors">📖 Library Catalog</button>
                </div>
                <div id="adminLink" class="hidden">
                    <p class="text-[9px] font-black text-stone-600 uppercase mb-4 mt-8 tracking-widest">Admin</p>
                    <button onclick="showView('admin')" class="text-sm text-orange-400 font-bold">🛡️ Manage Users</button>
                </div>
            </nav>
            <div class="p-6 bg-black border-t border-stone-900">
                <p class="text-xs text-white font-bold" id="displayName">--</p>
                <p class="text-[9px] uppercase text-stone-500" id="displayRole">--</p>
                <button onclick="doLogout()" class="mt-4 text-[10px] text-stone-700 uppercase font-bold hover:text-white">Sign Out</button>
            </div>
        </aside>

        <main class="flex-1 bg-[#fcfaf8] p-10 overflow-y-auto">
            <section id="view-catalog">
                <h2 class="serif text-4xl mb-8">Manuscript Repository</h2>
                <div id="catalogItems" class="space-y-3">
                    </div>
            </section>
            <section id="view-admin" class="hidden">
                <h2 class="serif text-4xl mb-8">User Governance</h2>
                <div id="userTable" class="bg-white rounded-3xl border border-stone-200 p-6 shadow-sm">
                    </div>
            </section>
        </main>
    </div>

    <script>
        // 1. Connection (using a unique name to avoid crashes)
        const MY_URL = "https://gcgxcnbimqpfrowesfms.supabase.co";
        const MY_KEY = "sb_publishable_XObSGljjo-VILprIHw_Bxw_FKM7uUOU";
        const kaulaClient = supabase.createClient(MY_URL, MY_KEY);

        // 2. Demo Logic
        function fillAndLogin(user) {
            document.getElementById('usernameField').value = user;
            document.getElementById('passwordField').value = "demo123";
            performLogin();
        }

        async function performLogin() {
            const user = document.getElementById('usernameField').value;
            const pass = document.getElementById('passwordField').value;
            const email = user.includes('@') ? user : user + "@kaula.org";

            const { data, error } = await kaulaClient.auth.signInWithPassword({ email, password: pass });
            if (error) {
                alert("Login Error: " + error.message);
            } else {
                location.reload();
            }
        }

        // 3. App State
        async function checkSession() {
            const { data: { session } } = await kaulaClient.auth.getSession();
            if (session) {
                document.getElementById('authPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadUserData(session.user);
            }
        }

        async function loadUserData(user) {
            const { data: profile } = await kaulaClient.from('profiles').select('*').eq('id', user.id).single();
            const role = profile?.role || 'public';

            document.getElementById('displayName').innerText = profile?.full_name || user.email.split('@')[0];
            document.getElementById('displayRole').innerText = role;

            if (role === 'admin') document.getElementById('adminLink').classList.remove('hidden');
            
            fetchCatalog();
        }

        async function fetchCatalog() {
            const { data } = await kaulaClient.from('manuscripts').select('*').limit(20);
            const container = document.getElementById('catalogItems');
            if (data) {
                container.innerHTML = data.map(m => `
                    <div class="bg-white p-5 rounded-2xl border border-stone-100 flex justify-between items-center shadow-sm">
                        <span class="font-bold text-stone-800">${m.title_iast}</span>
                        <span class="text-[10px] font-black text-stone-300 uppercase">${m.subject}</span>
                    </div>
                `).join('');
            }
        }

        function showView(view) {
            document.getElementById('view-catalog').classList.toggle('hidden', view !== 'catalog');
            document.getElementById('view-admin').classList.toggle('hidden', view !== 'admin');
        }

        async function doLogout() {
            await kaulaClient.auth.signOut();
            location.reload();
        }

        window.onload = checkSession;
    </script>
</body>
</html>
